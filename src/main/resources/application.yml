spring:
  application:
    name: axion-auth

  # ── DataSource ────────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:axion_db}
    username: ${DB_USERNAME:axion_user}
    password: ${DB_PASSWORD:axion_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: axion-auth-pool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA ───────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public

  # ── Flyway ────────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ─────────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

# ── Axion Meta OAuth Config ───────────────────────────────────────────────────
axion:
  meta:
    app-id: ${META_APP_ID:__UNSET__}
    app-secret: ${META_APP_SECRET:__UNSET__}
    redirect-uri: ${META_OAUTH_REDIRECT_URI:http://localhost:8080/api/v1/oauth/instagram/callback}
    webhook-verify-token: ${META_WEBHOOK_VERIFY_TOKEN:axion_default_verify_token_123}
    graph-api-base-url: ${META_GRAPH_API_BASE_URL:https://graph.facebook.com}
    graph-api-version: ${META_GRAPH_API_VERSION:v20.0}
    scopes:
      - instagram_basic
      - instagram_manage_messages
      - instagram_manage_insights
      - pages_show_list
      - pages_read_engagement
      - business_management
    # Per-account sliding-window rate-limit configuration.
    # Default mirrors Instagram Graph API's ~200 DMs/hour per access token.
    rate-limit:
      requests-per-hour: ${META_RATE_LIMIT_RPH:200}
      window-seconds: ${META_RATE_LIMIT_WINDOW_SECS:3600}
      # Emit a WARN log when usage exceeds this % of the limit (for alerting)
      warning-threshold-pct: ${META_RATE_LIMIT_WARN_PCT:80}
  token:
    encryption-key: ${TOKEN_ENCRYPTION_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
  oauth:
    state-ttl-seconds: ${OAUTH_STATE_TTL_SECONDS:600}
  auth:
    token-secret: ${AUTH_TOKEN_SECRET:dev-phase1-launch-secret-change-me}
    session-ttl-seconds: ${AUTH_SESSION_TTL_SECONDS:604800}
  automation:
    default-cooldown-seconds: ${AUTOMATION_COOLDOWN_SECONDS:3600}
    max-rules-per-message: ${AUTOMATION_MAX_RULES:10}
    eager-cache-warmup: ${AUTOMATION_EAGER_WARMUP:false}
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGIN_1:http://localhost:5173}
      - ${CORS_ALLOWED_ORIGIN_2:http://localhost:4173}

# ── Resilience4j ─────────────────────────────────────────────────
resilience4j:
  retry:
    instances:
      meta-graph-api:
        max-attempts: 4
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        # Cap back-off so we never wait longer than 8s between retries
        # (1s → 2s → 4s → 8s; no unbounded drift under high error rates)
        exponential-max-wait-duration: 8s
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - com.axion.auth.exception.TransientApiException
        ignore-exceptions:
          # Permanent errors: retrying will not help
          - com.axion.auth.exception.PermanentApiException
          - com.axion.auth.exception.OAuthException
          # Rate-limit: the slot is exhausted; retrying immediately just re-throws
          - com.axion.auth.exception.RateLimitExceededException
          # Token expiry: handled by one-shot inline refresh in InstagramMessageSenderService
          - com.axion.auth.exception.TokenExpiredException
  circuitbreaker:
    instances:
      meta-graph-api:
        register-health-indicator: true
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        # Calls taking longer than 10s (JDK timeout is 15s) count as slow
        slow-call-duration-threshold: 10s
        # Open the breaker if 80%+ of calls are slow within the sliding window
        slow-call-rate-threshold: 80

# ── Actuator / Observability ──────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: axion-auth
  tracing:
    sampling:
      probability: 1.0

# ── Logging (structured JSON via logback) ─────────────────────────────────────
logging:
  pattern:
    console: "%d{ISO8601} %highlight(%-5level) [%thread] [traceId=%X{traceId}] [tenantId=%X{tenantId}] %logger{36} - %msg%n"
  level:
    root: INFO
    com.axion: DEBUG
    org.springframework.security: WARN

# ── Thread pool — virtual threads (Java 21) ───────────────────────────────────
spring.threads.virtual.enabled: true

# ── Automation Engine ─────────────────────────────────────────────────────────
